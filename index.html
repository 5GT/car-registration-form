<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>차량등록 신청서 작성기</title>
<style>
:root{--line:#c3d5d8;--text:#17383f;--sub:#45656b;--pri:#2c6773;--pri2:#1f5662;--soft:#e7f0f2;--info:#eef6f7;--infol:#3b7b86;--err:#9c3d3d}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f4f8f8,#edf4f5);color:var(--text);font-family:"Malgun Gothic","Noto Sans KR",sans-serif}
.app{max-width:1120px;margin:24px auto;padding:0 16px 70px}.brand{display:flex;align-items:center;gap:12px}.brand-logo{width:58px;height:58px;object-fit:contain}.brand h1{margin:0;color:var(--pri2);font-size:44px;font-weight:800}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0}.tab{border:1px solid var(--line);background:#fff;color:#254d56;padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:700}.tab.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.panel{display:none;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px}.panel.active{display:block}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.c3{grid-column:span 3}.c4{grid-column:span 4}.c6{grid-column:span 6}.c12{grid-column:span 12}
label{display:block;font-size:13px;color:var(--sub);margin:0 0 6px;font-weight:700}select,input{width:100%;border:1px solid #bfd2d6;border-radius:10px;padding:10px 12px;background:#fff}#existingEditor input:disabled,#existingEditor select:disabled{background:#eef3f4;color:#5f7074;border-color:#cad7da;cursor:not-allowed}
.btn{border:1px solid transparent;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700}.btn.pri{background:var(--pri);color:#fff}.btn.pri:hover{background:var(--pri2)}.btn.soft{background:var(--soft);color:#245760;border-color:#bfd2d6}.btn.del{background:#fff0f0;color:var(--err);border-color:#f1c6c6}
.split{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.plate-head{display:flex;gap:20px;align-items:flex-end;margin-bottom:6px}.plate-head-left{flex:0 1 430px;max-width:430px}.plate-head-right{flex:1 1 320px;min-width:260px}.plate-row{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}.plate-group{display:flex;gap:10px;flex:0 1 430px;max-width:430px;min-width:300px}.plate-r2{flex:2 1 0}.plate-r4{flex:3 1 0}.plate-r5{flex:4 1 0}.carname-box{flex:0 0 360px;min-width:340px;max-width:360px}.carname-box input::placeholder{color:#7f9196}.sec{margin:14px 0 8px;font-size:15px;color:#2b5d66;font-weight:800}
.card{border:1px solid var(--line);background:#fafcff;border-radius:12px;padding:12px;margin:10px 0 14px;display:none}.card.show{display:block}
.meta{display:grid;grid-template-columns:repeat(4,minmax(100px,1fr));gap:8px}.meta div{background:#fff;border:1px solid #d3e1e4;border-radius:9px;padding:8px 10px;font-size:13px}.meta b{display:block;font-size:12px;color:#3f6168}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}.pill{border:1px solid #bed1d5;background:#fff;color:#2b535c;border-radius:999px;padding:7px 13px;font-size:13px;cursor:pointer}.pill.on{background:var(--pri);border-color:var(--pri);color:#fff}
.info{display:none;margin-top:8px;border-left:4px solid var(--infol);background:var(--info);padding:10px 12px;border-radius:8px;color:#244f56;font-size:13px;line-height:1.5}.info.show{display:block}.field-tip.compact{display:inline-block;max-width:100%;margin-top:8px;padding:7px 10px;border-left:4px solid #d2a93a;background:#fff9e8;font-size:13px;color:#5c4d1d;border-radius:6px}.field-tip.compact strong{font-weight:800;color:#3f2f00}
.hint{font-size:12px;color:#506a70;margin-top:6px}.err{color:var(--err);font-size:13px;margin:8px 0;min-height:18px;font-weight:700}
.list{display:grid;gap:8px}.item{border:1px solid #cfdee1;border-radius:10px;padding:10px;background:#fff;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.badges{display:flex;flex-wrap:wrap;gap:6px}.badge{font-size:12px;background:#edf4f5;border:1px solid #d1dee1;border-radius:999px;padding:3px 8px;color:#315962}
.preview{margin-top:14px;border:1px dashed #bdd0d4;border-radius:10px;padding:10px;background:#f9fcfc;max-height:500px;overflow:auto}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}th,td{border:1px solid #cfdee1;padding:8px;text-align:left}th{background:#ecf4f5;color:#2e5a62}
.modal-backdrop{position:fixed;inset:0;background:rgba(20,34,56,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999}.modal{background:#fff;border:1px solid #c8d7da;border-radius:12px;max-width:980px;width:100%;max-height:90vh;overflow:auto;padding:14px}
.print-page{width:210mm;height:297mm;margin:0 auto 8mm;background:#fff;border:1px solid #c5d5d8;padding:7.2mm;box-sizing:border-box;display:flex;flex-direction:column;gap:3.2mm;page-break-after:always}.print-page:last-child{page-break-after:auto}
.doc{border:1px solid #90aeb3;padding:3.4mm;flex:1;display:flex;flex-direction:column}.tit{text-align:center;font-size:20px;font-weight:800;margin-bottom:4mm}.dt{width:100%;border-collapse:collapse;font-size:11.8px}.dt th,.dt td{border:1px solid #87a8ad;padding:1.8mm 2.2mm;vertical-align:top;line-height:1.32}.dt th{width:24%;background:#eef4f5}.dt th.hand-th{background:#d0d0d0 !important;font-weight:800;-webkit-print-color-adjust:exact;print-color-adjust:exact}.dt-info{font-size:15px;table-layout:fixed;width:100%}.dt-info th,.dt-info td{line-height:1.3}.dt-info td{overflow-wrap:anywhere;word-break:break-word}.dt-two{table-layout:fixed;width:100%}.dt-two th{width:15%}.dt-two td{width:85%}.dt-two-wide{table-layout:fixed;width:100%}.dt-two-wide th{width:22%}.dt-two-wide td{width:78%}.dt-office{table-layout:fixed;width:100%}.dt-office th{width:17%}.dt-office td.main{width:58%}.dt-office td.signer{width:25%;text-align:right;vertical-align:bottom}.signline{text-align:right;vertical-align:bottom}.consent-box{line-height:1.45;text-align:center}.consent-sign{margin-top:2.2mm;text-align:right}.sign-hint{color:#8a989c;font-size:.92em;font-weight:400}.date-write{display:inline-flex;align-items:center}.date-write .date-slot{display:inline-block}.date-write .date-slot.y{min-width:15mm;margin-right:5mm}.date-write .date-slot.m{min-width:9mm;margin:0 3mm 0 3mm}.date-write .date-slot.d{min-width:9mm;margin:0 3mm 0 3mm}
.note{margin-top:4mm;font-size:12px;line-height:1.45;color:#2a5660}.sign{margin-top:auto;text-align:right;font-size:12px;color:#2a5560;padding-top:3mm}
.doc-title{text-align:center;font-size:16px;font-weight:800;letter-spacing:.2px;margin-bottom:2.2mm}.doc-sub{font-size:10.6px;color:#35606a;text-align:right;margin:-0.8mm 0 1.4mm}.note-list{line-height:1.35}.guide-title{font-weight:800;margin-bottom:1.8mm}.guide-wrap{display:flex;gap:3mm;align-items:stretch}.guide-left{flex:1}.guide-right{width:24%;min-width:30mm;display:flex}.nowrap{white-space:nowrap}.price-note{white-space:nowrap}.card-set{border:1px solid #93b1b6;padding:1.8mm;border-radius:2.2mm;background:#f8fbff;width:100%;display:flex;flex-direction:column;justify-content:flex-start}.card-ph{position:relative;display:flex;align-items:center;justify-content:center;color:#355179;font-size:10px;font-weight:800}.card-ph.square{height:31mm;border-radius:3mm;border:1px solid #7f97bc;background:linear-gradient(160deg,#dbe9d4 0%,#bcd6bd 25%,#6ea8a1 52%,#8a96c3 100%)}.card-ph.round{height:31mm;border-radius:999px;border:1px solid #8d9a7f;background:radial-gradient(circle at 35% 30%,#f1e6bf 0%,#d8c48b 45%,#b9a16d 100%)}.card-ph-label{line-height:1.2;text-align:center;color:#214b57;text-shadow:0 1px 0 rgba(255,255,255,.45)}.card-meta{margin-top:1.6mm;font-size:15px;line-height:1.2;color:#15333a;text-align:center;font-family:"Cascadia Mono","Consolas","Courier New",monospace;font-weight:800;letter-spacing:.7px}.card-img{width:100%;height:42mm;object-fit:contain;display:block}
@media(max-width:880px){.c3,.c4,.c6,.c12{grid-column:span 12}.meta{grid-template-columns:repeat(2,minmax(120px,1fr))}}
@media(max-width:880px){.topbar{align-items:stretch}.tabs{justify-content:flex-start}.plate-head{gap:10px}.plate-head-left,.plate-head-right{flex:1 1 100%;max-width:100%;min-width:100%}.plate-group{flex:1 1 100%;max-width:100%;min-width:100%}.carname-box{flex:1 1 100%;max-width:100%;min-width:100%}}
#p-write{font-size:1.3em}
#p-write label{font-size:16.9px}
#p-write select,#p-write input,#p-write .btn,#p-write .pill{font-size:16.9px}
#p-write .sec{font-size:19.5px}
#p-write .hint{font-size:15.6px}
#p-write .err{font-size:16.9px}
#p-write .badge{font-size:15.6px}
#p-write .item{font-size:16.9px}

#vehicleModalBackdrop .modal{font-size:1.3em}
#vehicleModalBackdrop .modal label{font-size:16.9px}
#vehicleModalBackdrop .modal select,#vehicleModalBackdrop .modal input,#vehicleModalBackdrop .modal .btn,#vehicleModalBackdrop .modal .pill{font-size:16.9px}
#vehicleModalBackdrop .modal .hint{font-size:15.6px}
#vehicleModalBackdrop .modal .err{font-size:16.9px}
@media print{body{background:#fff;margin:0}.app{display:none!important}#printArea{display:block!important;margin:0;padding:0}#printArea .print-page{margin:0;border:none}@page{size:A4 portrait;margin:0}}
</style>
</head>

const $=id=>document.getElementById(id);const key=(d,h)=>d&&h?`${d}-${h}`:"";const pad2=n=>String(n).padStart(2,"0");const dateParts=v=>{const d=v instanceof Date?new Date(v.getTime()):new Date(v||Date.now());return Number.isNaN(d.getTime())?new Date():d};const now=()=>{const d=dateParts();return `${d.getFullYear()}. ${pad2(d.getMonth()+1)}. ${pad2(d.getDate())}. ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`};const dateStamp=v=>{const d=dateParts(v);return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`};const fileStamp=v=>{const d=dateParts(v);return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}_${pad2(d.getHours())}-${pad2(d.getMinutes())}-${pad2(d.getSeconds())}`};const norm=v=>String(v||"").replace(/[\s-]/g,"").toUpperCase().trim();const esc=t=>String(t??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");const mkId=()=>`f-${Date.now()}-${Math.random().toString(16).slice(2,7)}`;const ownInfoHtml=o=>{const i=OWN_INFO[o];return i?`<div>- 제출서류: ${esc(i.docs)}</div><div>- 확인내용: ${esc(i.note)}</div>`:""};const phoneDigits=v=>String(v||"").replace(/\D/g,"").slice(0,11);const phoneFormat=v=>{const d=phoneDigits(v);if(d.length<=3)return d;if(d.length<=7)return `${d.slice(0,3)}-${d.slice(3)}`;return `${d.slice(0,3)}-${d.slice(3,7)}-${d.slice(7,11)}`};const validPhone=v=>/^01\d-\d{3,4}-\d{4}$/.test(String(v||"").trim());
function normalizeCategorySelection(categories,toggled=null){
  const set=new Set((Array.isArray(categories)?categories:[]).map(v=>String(v||"").trim()).filter(v=>CAT.includes(v)));
  if(toggled!==null){
    const value=String(toggled||"").trim();
    if(!CAT.includes(value))return set.size?[...set]:[CAT_NONE];
    if(value===CAT_NONE)return[CAT_NONE];
    set.delete(CAT_NONE);
    if(set.has(value)){
      set.delete(value);
    }else{
      if(value==="경차")set.delete("대형");
      if(value==="대형")set.delete("경차");
      set.add(value);
    }
  }
  const normalized=[...set].filter(Boolean);
  return normalized.length?normalized:[CAT_NONE];
}
function validateVehicleFields({region="\uC5C6\uC74C",mid="",last="",ownerName="",applicantName="",applicantPhone="",carType="",ownership="",categories=[]}){
  const cleanRegion=String(region||"\uC5C6\uC74C").trim();
  const cleanMid=String(mid||"").replace(/\s/g,"").trim();
  const cleanLast=String(last||"").replace(/\D/g,"").trim();
  const cleanOwnerName=String(ownerName||"").trim();
  const cleanApplicantName=String(applicantName||"").trim();
  const cleanApplicantPhone=phoneFormat(applicantPhone||"");
  const cleanCarType=String(carType||"").trim();
  const cleanOwnership=String(ownership||"").trim();
  const cleanCategories=normalizeCategorySelection(categories);
  if(!/^\d{2,3}[\uAC00-\uD7A3]$/.test(cleanMid))return{ok:false,error:"\uBC88\uD638 \uC55E\uC790\uB9AC\uB294 \uC22B\uC790 2~3\uC790\uB9AC\uC640 \uD55C\uAE00 1\uAE00\uC790\uB85C \uC785\uB825\uD574 \uC8FC\uC138\uC694. (\uC608: 12\uAC00)"};
  if(!/^\d{4}$/.test(cleanLast))return{ok:false,error:"\uBC88\uD638 \uB4B7\uC790\uB9AC\uB294 \uC22B\uC790 4\uC790\uB9AC\uB85C \uC785\uB825\uD574 \uC8FC\uC138\uC694. (\uC608: 1234)"};
  if(!cleanOwnership)return{ok:false,error:"\uBCF4\uC720\uD615\uD0DC\uB97C \uC120\uD0DD\uD574 \uC8FC\uC138\uC694."};
  if(!cleanOwnerName)return{ok:false,error:"\uC18C\uC720\uC790 \uC131\uD568\uC744 \uC785\uB825\uD574 \uC8FC\uC138\uC694."};
  if(!cleanApplicantName)return{ok:false,error:"\uC2E0\uCCAD\uC778 \uC131\uD568\uC744 \uC785\uB825\uD574 \uC8FC\uC138\uC694."};
  if(!validPhone(cleanApplicantPhone))return{ok:false,error:"\uC5F0\uB77D\uCC98\uB294 010-0000-0000 \uD615\uC2DD\uC73C\uB85C \uC785\uB825\uD574 \uC8FC\uC138\uC694."};
  if(!cleanCarType)return{ok:false,error:"\uCC28\uBA85\uC744 \uC785\uB825\uD574 \uC8FC\uC138\uC694."};
  return{ok:true,value:{region:cleanRegion,mid:cleanMid,last:cleanLast,ownerName:cleanOwnerName,applicantName:cleanApplicantName,applicantPhone:cleanApplicantPhone,carType:cleanCarType,ownership:cleanOwnership,categories:cleanCategories,car:buildCarNo(cleanRegion,cleanMid,cleanLast),categoryText:cleanCategories.join("/")}};
}

      has("\uC804\uAE30\uCC28")?`* ${CAT_INFO["\uC804\uAE30\uCC28"]}`:"",
      has("\uACBD\uCC28")?`* ${CAT_INFO["\uACBD\uCC28"]}`:"",
      has("\uB300\uD615")?`* ${CAT_INFO["\uB300\uD615"]}`:"",
      has("\uC7A5\uC560\uC778\uC8FC\uCC28\uD45C\uC9C0")?`* ${CAT_INFO["\uC7A5\uC560\uC778\uC8FC\uCC28\uD45C\uC9C0"]}`:""
    ].filter(Boolean).join("<br>");

    return `<div class="print-page"><div class="doc"><div class="doc-title">차량 등록 신청서</div><div class="doc-sub">관리사무소 보관용</div><table class="dt dt-info"><colgroup><col style="width:5%"><col style="width:35%"><col style="width:5%"><col style="width:55%"></colgroup><tr><th>동 / 호</th><td>${esc(dongho)}</td><th>신청일자</th><td>${esc(day)}</td></tr><tr><th>차량번호</th><td>${esc(v.carNumber||"")}</td><th>차명</th><td>${esc(v.carType||"")}</td></tr><tr><th>차량구분</th><td colspan="3">${catChecks}</td></tr><tr><th>소유자</th><td>${esc(v.ownerName||"")}</td><th>보유형태</th><td>${ownChecks}</td></tr><tr><th>신청인</th><td>${esc(v.applicantName||"")}</td><th>연락처</th><td>${esc(v.applicantPhone||"")}</td></tr></table><table class="dt dt-two" style="margin-top:2.2mm"><tr><td colspan="2"><div class="guide-title">차량 등록 안내 및 유의사항</div><div class="guide-wrap"><div class="guide-left note-list">1. 세대당 차량은 최대 3대까지 등록할 수 있습니다. (1대 무료 / 2대 월 3만원 / 3대 월 20만원)<br>2. 차량등록카드(주차스티커)는 차량 내부 조수석 하단 부착이 원칙이며, 외부에 양도, 판매, 대여할 수 없습니다.<br>3. 단지 내에서는 서행(10km/h 이하) 및 보행자 우선 원칙을 준수해야 합니다.<br>4. 주차관리 규정을 위반할 경우 경고 및 관리규정에 따른 조치가 적용될 수 있습니다.<br><br><b>선택 항목 안내</b><br>${selectedGuide}</div><div class="guide-right"><div class="card-set"><img class="card-img" src="${isCompact?CARD_IMG_COMPACT:CARD_IMG_NORMAL}" alt="등록카드" loading="eager" decoding="sync" /><div class="card-meta">${esc(cardCode)}</div></div></div></div></td></tr></table><table class="dt" style="margin-top:2.2mm"><tr><td>개인정보는 차량 등록, 주차 관리, 출입 확인 및 비상 연락을 위한 목적으로만 사용되며, 필요한 범위에서만 이용됩니다.</td></tr><tr><td class="consent-box">본인은 상기 안내 내용과 단지 주차관리 규정을 확인하였으며, 이를 준수할 것에 동의합니다.<div class="consent-sign">신청인 성함 : ____________________ <span class="sign-hint">(서명)</span></div></td></tr></table><table class="dt dt-office" style="margin-top:1.4mm"><tr><th>제출서류 확인<br>(관리사무소)</th><td class="note-list main">- 제출서류: ${esc(ownDocs(own))}<br>- 확인내용: ${esc(OWN_INFO[own]?.note||"-")}</td><td class="signer">확인자: ____________________</td></tr></table></div><div class="doc"><div class="doc-title">차량 등록 해지 신청서</div><div class="doc-sub">관리사무소 보관용</div><table class="dt dt-info"><colgroup><col style="width:5%"><col style="width:35%"><col style="width:5%"><col style="width:55%"></colgroup><tr><th>동 / 호</th><td>${esc(dongho)}</td><th class="hand-th">해지 신청일</th><td><span class="date-write"><span class="date-slot y"></span>년<span class="date-slot m"></span>월<span class="date-slot d"></span>일</span></td></tr><tr><th>차량번호</th><td>${esc(v.carNumber||"")}</td><th>차명</th><td>${esc(v.carType||"")}</td></tr><tr><th class="hand-th">해지사유</th><td colspan="3">☐ 차량매매 / ☐ 차량교체 / ☐ 전출 / ☐ 기타</td></tr><tr><th class="hand-th">해지 신청인</th><td></td><th class="hand-th">연락처</th><td></td></tr></table><table class="dt dt-two" style="margin-top:2.2mm"><tr><th>안내 내용</th><td class="note-list">1. 해지와 동시에 해당 차량의 주차 등록 권한은 종료됩니다.<br>2. 등록카드는 반드시 반납해 주시기 바랍니다.<br>3. 분실 시 재발급/분실 처리 비용 5,000원이 부과됩니다.</td></tr><tr><th class="hand-th">서명</th><td class="signline">해지 신청인 ____________________ <span class="sign-hint">(서명)</span></td></tr></table><table class="dt dt-office" style="margin-top:1.4mm"><tr><th>등록카드 반납 확인<br>(관리사무소)</th><td class="main">☐ 반납 / ☐ 분실 (5,000원 납부 확인)</td><td class="signer">확인자: ____________________</td></tr></table></div></div>`;
  }).join("");
}
function preloadCardAssets(){const a=[CARD_IMG_NORMAL,CARD_IMG_COMPACT].map(src=>new Promise(r=>{const img=new Image();img.onload=()=>r(true);img.onerror=()=>r(false);img.src=src}));return Promise.all(a)}
const CARD_PRELOAD=preloadCardAssets();
async function waitForCardImages(root){const imgs=[...root.querySelectorAll("img.card-img")];if(!imgs.length)return;await Promise.all(imgs.map(img=>{if(typeof img.decode==="function"){return img.decode().catch(()=>new Promise(res=>{if(img.complete)res();else{img.addEventListener("load",()=>res(),{once:true});img.addEventListener("error",()=>res(),{once:true})}}))}return new Promise(res=>{if(img.complete)res();else{img.addEventListener("load",()=>res(),{once:true});img.addEventListener("error",()=>res(),{once:true})}})}));}
async function preview(vehicles,target){if(!vehicles.length){target.innerHTML=' <div class="hint">선택된 차량이 없습니다.</div>';return}await CARD_PRELOAD;const h=pages(vehicles);target.innerHTML=h;$("printArea").innerHTML=h;await waitForCardImages(target);await waitForCardImages($("printArea"));await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)))}
async function doPrint(vehicles){if(!vehicles.length)return;await CARD_PRELOAD;$("printArea").innerHTML=pages(vehicles);await waitForCardImages($("printArea"));await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));window.print()}
function commit(){const ex=loadReg(S.dong,S.ho),dr=filledForms();if(!dr.length){$("pErr").textContent="확정할 신규 차량이 없습니다.";return false}if(ex.length+dr.length>CFG.MAX){$("pErr").textContent=`최대 ${CFG.MAX}대를 초과하여 확정할 수 없습니다.`;return false}const vErr=validateDraftBeforeCommit();if(vErr){$("pErr").textContent=vErr;return false}saveReg(S.dong,S.ho,[...ex,...dr]);setForms(S.dong,S.ho,[]);S.selPrint.clear();$("pErr").textContent="등록 확정이 완료되었습니다.";renderWrite();if(S.admin)renderAdmin();return true}function allUnits(){const units=[];getDongs().forEach(d=>getHosByDong(d).forEach(h=>{const regs=loadReg(d,h);units.push({dong:d,ho:h,type:getUnitType(d,h)||"",count:regs.length,regs})}));return units}
function getAdminRows(){const fd=$("fDong").value,fc=norm($("fCar").value),fcount=$("fCount").value;const units=allUnits().filter(u=>(!fd||u.dong===fd)&&(!fcount||String(u.count)===fcount));const rows=[];units.forEach(u=>{u.regs.forEach((v,idx)=>{if(fc&&!norm(v.carNumber).includes(fc))return;rows.push({dong:u.dong,ho:u.ho,type:u.type,carNumber:v.carNumber||"",carType:v.carType||"",ownership:v.ownership||"",category:v.category||"",registeredAt:v.registeredAt||"",applicantName:v.applicantName||"",applicantPhone:v.applicantPhone||"",ownerName:v.ownerName||"",rowIndex:idx})})});const totalCars=allUnits().reduce((s,u)=>s+u.count,0);const filteredCars=rows.length;return{rows,totalCars,filteredCars}}
function deleteAdminRow(dong,ho,rowIndex){const arr=loadReg(dong,ho);if(rowIndex<0||rowIndex>=arr.length)return;const car=arr[rowIndex]?.carNumber||"";if(!confirm(`해당 차량을 삭제하시겠습니까?\n${car}`))return;arr.splice(rowIndex,1);saveReg(dong,ho,arr);if(S.dong===dong&&S.ho===ho){S.exEdit=null;renderWrite()}if(S.admin)renderAdmin()}function renderAdmin(){
  if(!S.admin)return;
  const d=getAdminRows();
  $("adminStats").textContent=`총 등록 차량 대수 ${d.totalCars}대 / 검색된 차량 대수 ${d.filteredCars}대`;
  $("aBody").innerHTML=d.rows.map(r=>`<tr><td>${esc(r.dong)}</td><td>${esc(r.ho)}</td><td>${esc(r.type)}</td><td>${esc(r.carNumber)}</td><td>${esc(r.carType)}</td><td>${esc(r.ownership)}</td><td>${esc(r.category)}</td><td>${esc(r.registeredAt)}</td><td><button type="button" class="btn del" data-adel="1" data-dong="${r.dong}" data-ho="${r.ho}" data-idx="${r.rowIndex}">삭제</button></td></tr>`).join("")||'<tr><td colspan="9" style="text-align:center">데이터 없음</td></tr>';
  $("aBody").querySelectorAll("button[data-adel]").forEach(b=>b.onclick=e=>{const t=e.currentTarget;deleteAdminRow(String(t.dataset.dong||""),String(t.dataset.ho||""),Number(t.dataset.idx))});
}function cesc(v){const s=String(v??"");return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s}
function dl(name,heads,rows){const csv=[heads.join(","),...rows.map(r=>heads.map(h=>cesc(r[h]||"")).join(","))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href)}
function dlXlsx(name,heads,rows){if(typeof XLSX==="undefined"){alert("XLSX 라이브러리를 불러오지 못했습니다. 인터넷 연결 또는 보안 정책을 확인해 주세요.");return}const aoa=[heads,...rows.map(r=>heads.map(h=>r[h]??""))];const ws=XLSX.utils.aoa_to_sheet(aoa);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"ERP");XLSX.writeFile(wb,name,{bookType:"xlsx"})}
function exportErpXlsx(){
  const src=getAdminRows().rows;
  const rows=src.map(r=>({
    "동":r.dong||"",
    "호":r.ho||"",
    "차량지역":erpCarRegion(r.carNumber),
    "차량번호":String(r.carNumber||"").replace(/\D/g,"").slice(-4).padStart(4,"0"),
    "등록인":r.applicantName||"",
    "년식":"",
    "차종":r.carType||"",
    "배기량":"",
    "색상":"",
    "연락처":r.applicantPhone||"",
    "등록일":ymd(r.registeredAt).replace(/-/g,""),
    "해지일":"",
    "고유번호":"",
    "스티커발급번호":makeStickerCode(r.dong,r.ho,r.carNumber),
    "스티커발급일":ymd(r.registeredAt).replace(/-/g,""),
    "전기차여부":String(r.category||"").includes("전기차")?"Y":"N",
    "비고":""
  }));
  const d=dateStamp();
  const heads=["동","호","차량지역","차량번호","등록인","년식","차종","배기량","색상","연락처","등록일","해지일","고유번호","스티커발급번호","스티커발급일","전기차여부","비고"];
  dlXlsx(`ERP_${d}.xlsx`,heads,rows);
}
function ymd(v){const d=new Date(v||Date.now());if(!Number.isNaN(d.getTime()))return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;const m=String(v||"").match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);if(m)return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;return ""}
function stickerAlphaByDong(dong){const map={"31":"QF","32":"KT","33":"LM","34":"RX","35":"DV","36":"ZP","37":"HY","38":"BN","39":"CU","40":"WG","41":"TS","42":"AJ","43":"EK"};const d2=String(dong||"").replace(/\D/g,"").slice(-2);return map[d2]||"XX"}
function makeStickerCode(dong,ho,carNumberOrLast4){const alpha=stickerAlphaByDong(dong);const ho4=String(ho||"").replace(/\D/g,"").slice(-4).padStart(4,"0");const car4=String(carNumberOrLast4||"").replace(/\D/g,"").slice(-4).padStart(4,"0");return `${alpha}${ho4}${car4}`}
function erpCarRegion(carNumber){const src=String(carNumber||"").replace(/[\s-]/g,"").trim();if(!src)return "";const m=src.match(/^(.*)\d{4}$/);return m?m[1]:src}
function parkCodes(category){const cats=String(category||"").split("/").map(s=>String(s).trim()).filter(Boolean);const has=x=>cats.includes(x);const size=has("대형")?"PP0303":has("경차")?"PP0302":"PP0301";const kind=has("전기차")?"PP0502":"PP0501";const disabled=has("장애인주차표지")?"Y":"N";return{size,kind,disabled}}
function exportParkControlXlsx(){const src=getAdminRows().rows;const rows=src.map(r=>{const code=parkCodes(r.category);return{"고객":r.applicantName||"","차량번호":r.carNumber||"","핸드폰번호":r.applicantPhone||"","전화번호":"","차량모델":r.carType||"","동정보":r.dong||"","호수정보":r.ho||"","실정보":"0","구역":"01,02","시작일":ymd(r.registeredAt),"종료일":"2099-12-31","세대통보":"Y","차량규격":code.size,"차량종류":code.kind,"장애여부":code.disabled,"메모":"","상태":"PR0101","부제 예외":"N","표시 문구":"PR0301"}});const d=dateStamp();const heads=["고객","차량번호","핸드폰번호","전화번호","차량모델","동정보","호수정보","실정보","구역","시작일","종료일","세대통보","차량규격","차량종류","장애여부","메모","상태","부제 예외","표시 문구"];dlXlsx(`주차관제_${d}.xlsx`,heads,rows)}
function exportCsv(kind){
  const rows=getAdminRows().rows;
  const d=dateStamp();
  if(kind==="erp")exportErpXlsx();
  if(kind==="park")exportParkControlXlsx();
  if(kind==="knock")dl(`노크용_${d}.csv`,["dong","ho","carNumber","carType","ownership","registeredAt"],rows);
}
function backupData(){
  const units=allUnits();
  const payload={exportedAt:now(),totalCars:units.reduce((s,u)=>s+u.count,0),units:units.map(u=>({dong:u.dong,ho:u.ho,type:u.type,registered:u.regs}))};
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:"application/json;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  const t=fileStamp();
  a.download=`차량등록_백업_${t}.json`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function sanitizeRestoredVehicle(v){
  if(!v||typeof v!=="object")return null;
  const carNumber=String(v.carNumber||"").trim();
  const ownership=String(v.ownership||"").trim();
  const category=String(v.category||"").trim();
  const carType=String(v.carType||"").trim();
  if(!carNumber)return null;
  const ownerName=String(v.ownerName||"").trim();
  const applicantName=String(v.applicantName||"").trim();
  const applicantPhone=phoneFormat(v.applicantPhone||"");
  if(!ownerName||!applicantName||!validPhone(applicantPhone))return null;
  return{carNumber,ownerName,applicantName,applicantPhone,carType,ownership,category,registeredAt:String(v.registeredAt||now())};
}
function restoreData(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const data=JSON.parse(String(rd.result||"{}"));
      if(!Array.isArray(data.units))throw new Error("invalid");
      let skipped=0;
      Object.keys(localStorage).forEach(k=>{if(/^\d+-\d+$/.test(k))localStorage.removeItem(k)});
      data.units.forEach(u=>{
        if(!u||typeof u!=="object"){skipped++;return}
        const d=String(u.dong||""),h=String(u.ho||"");
        if(!getUnitType(d,h)){skipped++;return}
        if(!Array.isArray(u.registered)){skipped++;return}
        const cleaned=[];
        const seen=new Set();
        u.registered.forEach(v=>{
          const n=sanitizeRestoredVehicle(v);
          if(!n){skipped++;return}
          const keyNo=norm(n.carNumber);
          if(seen.has(keyNo)){skipped++;return}
          seen.add(keyNo);
          cleaned.push(n);
        });
        saveReg(d,h,cleaned);
      });
      S.forms={};S.exEdit=null;S.selPrint.clear();
      renderWrite();if(S.admin)renderAdmin();
      alert(skipped>0?`백업 데이터를 가져왔습니다.\n제외된 비정상 항목: ${skipped}건`:"백업 데이터를 가져왔습니다.");
    }catch{
      alert("백업 파일 형식이 올바르지 않습니다.");
    }
  };
  rd.readAsText(file,"utf-8");
}
function init(){const forceReselect=sessionStorage.getItem("forceReselect")==="1";if(forceReselect)sessionStorage.removeItem("forceReselect");renderDongs();renderHos();renderWrite();if(forceReselect){S.dong="";S.ho="";$("dong").value="";$("ho").innerHTML='<option value="">호 선택</option>';$("ho").disabled=true;renderWrite()}const logo=document.querySelector(".brand-logo");if(logo){logo.style.cursor="pointer";logo.onclick=()=>{sessionStorage.setItem("forceReselect","1");location.reload()}}document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setMode(t.dataset.m));
$("dong").onchange=e=>{S.dong=e.target.value;S.ho="";S.exEdit=null;S.selPrint.clear();$("wErr").textContent="";renderHos();renderWrite()};
$("ho").onchange=e=>{S.ho=e.target.value;S.exEdit=null;S.selPrint.clear();$("wErr").textContent="";renderWrite()};
$("addBtn").onclick=openModal;$("printReqBtn").onclick=quickConfirmAndPrint;
$("modalClose").onclick=closeModal;$("modalSave").onclick=saveModal;["modalMid","modalLast","modalOwnerName","modalApplicantName","modalApplicantPhone","modalCarType"].forEach(id=>$(id).onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();saveModal()}});
$("exUpdateBtn").onclick=updateExisting;$("exPrintBtn").onclick=printExistingEdited;
$("backWrite").onclick=()=>{$("pErr").textContent="";setMode("write")};
$("pvPrint").onclick=async()=>{const arr=combined().filter(v=>S.selPrint.has(v.ref));if(!arr.length){$("pErr").textContent="미리보기할 차량을 선택해 주세요.";return}$("pErr").textContent="";await preview(arr,$("preview"))};
$("ptPrint").onclick=async()=>{const arr=combined().filter(v=>S.selPrint.has(v.ref));if(!arr.length){$("pErr").textContent="인쇄할 차량을 선택해 주세요.";return}$("pErr").textContent="";await doPrint(arr)};
$("confirmBtn").onclick=commit;
const adminLogin=()=>{if($("pw").value===CFG.ADMIN_PASSWORD){S.admin=true;$("adminLock").style.display="none";$("adminBox").style.display="block";$("aErr").textContent="";renderAdmin()}else $("aErr").textContent="비밀번호가 올바르지 않습니다."};$("loginBtn").onclick=adminLogin;$("pw").onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();adminLogin()}};
$("fDong").onchange=renderAdmin;$("fCount").onchange=renderAdmin;$("fCar").oninput=renderAdmin;$("csvErp").onclick=exportErpXlsx;$("csvPark").onclick=exportParkControlXlsx;$("csvKnock").onclick=()=>exportCsv("knock");$("backupBtn").onclick=backupData;$("restoreBtn").onclick=()=>$("restoreFile").click();$("restoreFile").onchange=e=>{const f=e.target.files&&e.target.files[0];if(f)restoreData(f);e.target.value="";};
}
init();
