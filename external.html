<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
:root{
  --paper:#fffdf8;
  --ink:#20333a;
  --sub:#5f7178;
  --line:#d4cbbd;
  --accent:#1f6f78;
  --accent-strong:#155057;
  --accent-soft:#e4f0ee;
  --danger:#a24b41;
  --ok:#1f7a52;
  --shadow:0 20px 60px rgba(44,42,34,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Segoe UI","Malgun Gothic",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top right, rgba(31,111,120,.12), transparent 22rem),
    linear-gradient(180deg,#f8f3ea 0%,#efe6d8 100%);
}
.shell{
  width:min(1080px,calc(100% - 32px));
  margin:0 auto;
  padding:28px 0 80px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}
.topbar a{
  color:var(--accent-strong);
  text-decoration:none;
  font-weight:700;
}
.panel{
  background:var(--paper);
  border:1px solid rgba(255,255,255,.72);
  border-radius:30px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.hero{
  padding:34px 32px 26px;
  border-bottom:1px solid var(--line);
  background:
    linear-gradient(135deg,rgba(31,111,120,.10),rgba(31,111,120,0)),
    linear-gradient(180deg,#fffdf9,#f7f0e5);
}
.eyebrow{
  display:inline-flex;
  padding:8px 14px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent-strong);
  font-size:12px;
  font-weight:700;
}
h1{
  margin:16px 0 10px;
  font-size:clamp(30px,4.2vw,44px);
  line-height:1.14;
  letter-spacing:-.03em;
}
.lead{
  margin:0;
  color:var(--sub);
  line-height:1.7;
}
.content{
  padding:28px 32px 32px;
}
.info-box{
  padding:18px 20px;
  border:1px solid var(--line);
  border-radius:20px;
  background:#fffaf1;
  margin-bottom:20px;
}
.info-box p{
  margin:0;
  line-height:1.7;
  color:var(--sub);
}
.grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:14px;
}
.c4{grid-column:span 4}
.c6{grid-column:span 6}
.c8{grid-column:span 8}
.c12{grid-column:span 12}
label{
  display:block;
  margin-bottom:7px;
  font-size:14px;
  font-weight:700;
}
input,select,button{
  font:inherit;
}
input[type="text"],select{
  width:100%;
  min-height:48px;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:14px;
  background:#fff;
  color:var(--ink);
}
.choice-group{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.choice{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:44px;
  padding:10px 14px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
}
.choice input{margin:0}
.section-title{
  margin:28px 0 14px;
  font-size:20px;
}
.vehicle-list{
  display:grid;
  gap:16px;
}
.vehicle-block{
  padding:20px;
  border:1px solid var(--line);
  border-radius:24px;
  background:#fffdfa;
}
.vehicle-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.vehicle-head h3{
  margin:0;
  font-size:22px;
}
.subnote{
  margin:10px 0 0;
  color:var(--sub);
  font-size:13px;
  line-height:1.6;
}
.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:24px;
}
button{
  appearance:none;
  border:0;
  min-height:50px;
  padding:0 18px;
  border-radius:16px;
  cursor:pointer;
}
.btn-primary{
  background:var(--accent);
  color:#fff;
  font-weight:700;
}
.btn-secondary{
  background:#405e64;
  color:#fff;
}
.btn-light{
  background:#ece3d4;
  color:var(--ink);
}
.btn-danger{
  background:#f4d9d2;
  color:var(--danger);
  font-weight:700;
}
.status{
  margin-top:18px;
  padding:14px 16px;
  border-radius:16px;
  display:none;
  line-height:1.6;
}
.status.show{display:block}
.status.info{background:#eef6f7;color:var(--accent-strong)}
.status.error{background:#f9e6e2;color:var(--danger)}
.status.success{background:#e8f6ee;color:var(--ok)}
@media (max-width:860px){
  .c4,.c6,.c8{grid-column:span 12}
}
@media (max-width:640px){
  .shell{width:min(100%,calc(100% - 20px));padding:16px 0 40px}
  .hero,.content{padding:22px 18px}
  .vehicle-head{align-items:flex-start;flex-direction:column}
  .topbar{align-items:flex-start;flex-direction:column}
}
</style>
</head>

<script>
"use strict";
const SUPABASE_URL = "https://qjaqbvytoyqysdlfywbm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqYXFidnl0b3lxeXNkbGZ5d2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzA0NTMsImV4cCI6MjA4ODc0NjQ1M30.GMiLAzShrjCVT5k3GcyUodfndEobwHvpwWp-PtxrN0Y";
const TABLE_NAME = "external_car_registrations";
const REGION_OPTIONS = ["\uC5C6\uC74C","\uACBD\uAE30","\uC11C\uC6B8","\uC778\uCC9C","\uAC15\uC6D0","\uCDA9\uBD81","\uCDA9\uB0A8","\uC138\uC885","\uB300\uC804","\uC804\uBD81","\uACBD\uBD81","\uB300\uAD6C","\uACBD\uB0A8","\uC6B8\uC0B0","\uBD80\uC0B0","\uC804\uB0A8","\uAD11\uC8FC","\uC81C\uC8FC"];
const ACCESS_ZONE_OPTIONS = ["\uC9C0\uC0C1","\uC9C0\uD558"];
const vehicleListEl = document.getElementById("vehicleList");
const companyNameEl = document.getElementById("companyName");
const addVehicleBtn = document.getElementById("addVehicleBtn");
const submitBtn = document.getElementById("submitBtn");
const resetBtn = document.getElementById("resetBtn");
const statusEl = document.getElementById("status");
let vehicleCount = 0;

function escapeHtml(value){
  return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function setStatus(message,type){
  statusEl.textContent = message;
  statusEl.className = `status show ${type || "info"}`;
}
function clearStatus(){
  statusEl.textContent = "";
  statusEl.className = "status";
}
function formatPhone(value){
  const digits = String(value || "").replace(/\D/g,"").slice(0,11);
  if (digits.length <= 3) return digits;
  if (digits.length <= 7) return `${digits.slice(0,3)}-${digits.slice(3)}`;
  return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7,11)}`;
}
function isValidPhone(value){
  return /^01\d-\d{3,4}-\d{4}$/.test(String(value || "").trim());
}
function getSubmissionId(){
  if (window.crypto && typeof window.crypto.randomUUID === "function") return window.crypto.randomUUID();
  return `sub-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}
function buildVehicleBlock(index){
  const regionOptions = REGION_OPTIONS.map((region) => `<option value="${escapeHtml(region)}">${escapeHtml(region)}</option>`).join("");
  const accessZoneOptions = ACCESS_ZONE_OPTIONS.map((zone) => `
    <label class="choice">
      <input type="checkbox" name="accessZone${index}" value="${escapeHtml(zone)}">
      <span>${escapeHtml(zone)}</span>
    </label>
  `).join("");
  return `
    <section class="vehicle-block" data-vehicle-index="${index}">
      <div class="vehicle-head">
        <h3>\uCC28\uB7C9 ${index}</h3>
        ${index > 1 ? `<button type="button" class="btn-danger" data-remove-vehicle="${index}">\uC0AD\uC81C</button>` : ""}
      </div>
      <div class="grid">
        <div class="c4">
          <label for="region${index}">\uBC88\uD638\uD310 \uC9C0\uC5ED\uBA85</label>
          <select id="region${index}">${regionOptions}</select>
        </div>
        <div class="c4">
          <label for="mid${index}">\uCC28\uB7C9\uBC88\uD638 \uC55E\uBD80\uBD84</label>
          <input id="mid${index}" type="text" placeholder="\uC608: 12\uAC00">
        </div>
        <div class="c4">
          <label for="last${index}">\uCC28\uB7C9\uBC88\uD638 \uB4B7\uBD80\uBD84</label>
          <input id="last${index}" type="text" inputmode="numeric" maxlength="4" placeholder="\uC608: 1234">
        </div>
        <div class="c4">
          <label for="carName${index}">\uCC28\uBA85</label>
          <input id="carName${index}" type="text" placeholder="\uC608: \uC2A4\uD0C0\uB9AC\uC544, \uD3EC\uD130">
        </div>
        <div class="c4">
          <label for="ownerName${index}">\uC18C\uC720\uC790 \uC131\uD568</label>
          <input id="ownerName${index}" type="text" placeholder="\uC608: \uD64D\uAE38\uB3D9">
        </div>
        <div class="c4">
          <label for="applicantName${index}">\uC0AC\uC6A9\uC790 \uC131\uD568</label>
          <input id="applicantName${index}" type="text" placeholder="\uC608: \uD64D\uAE38\uB3D9">
        </div>
        <div class="c4">
          <label for="applicantPhone${index}">\uC0AC\uC6A9\uC790 \uC5F0\uB77D\uCC98</label>
          <input id="applicantPhone${index}" type="text" inputmode="numeric" maxlength="13" placeholder="\uC608: 010-1234-5678">
        </div>
        <div class="c8">
          <label>\uCD9C\uC785\uAD6C\uC5ED</label>
          <div class="choice-group" data-access-zone-group="${index}">${accessZoneOptions}</div>
          <p class="subnote">\uC77C\uBC18\uC801\uC73C\uB85C \uC9C0\uC0C1, \uC9C0\uD558 \uBAA8\uB450 \uC120\uD0DD\uD560 \uC218 \uC788\uC73C\uBA70 \uC9C0\uD558\uB97C \uC774\uC6A9\uD558\uC9C0 \uC54A\uB294 \uCC28\uB7C9\uC740 \uC9C0\uC0C1\uB9CC \uC120\uD0DD\uD574 \uC8FC\uC138\uC694.</p>
        </div>
        <div class="c12">
          <label class="choice">
            <input id="masterKeyRequested${index}" type="checkbox">
            <span>\uB9C8\uC2A4\uD130\uD0A4 \uBC1C\uAE09</span>
          </label>
        </div>
      </div>
    </section>
  `;
}
function attachVehicleBehaviors(index){
  const phoneEl = document.getElementById(`applicantPhone${index}`);
  const midEl = document.getElementById(`mid${index}`);
  const lastEl = document.getElementById(`last${index}`);
  if (phoneEl) phoneEl.addEventListener("input", (event) => { event.target.value = formatPhone(event.target.value); });
  if (midEl) midEl.addEventListener("input", (event) => { event.target.value = String(event.target.value || "").replace(/\s/g,"").toUpperCase(); });
  if (lastEl) lastEl.addEventListener("input", (event) => { event.target.value = String(event.target.value || "").replace(/\D/g,"").slice(0,4); });
  const removeBtn = document.querySelector(`[data-remove-vehicle="${index}"]`);
  if (removeBtn) {
    removeBtn.addEventListener("click", () => {
      const block = document.querySelector(`[data-vehicle-index="${index}"]`);
      if (block) block.remove();
      renumberVehicleBlocks();
    });
  }
}
function addVehicleBlock(){
  vehicleCount += 1;
  vehicleListEl.insertAdjacentHTML("beforeend", buildVehicleBlock(vehicleCount));
  attachVehicleBehaviors(vehicleCount);
}
function renumberVehicleBlocks(){
  const blocks = Array.from(document.querySelectorAll("[data-vehicle-index]"));
  const values = blocks.map((block) => {
    const oldIndex = Number(block.dataset.vehicleIndex);
    return {
      region: document.getElementById(`region${oldIndex}`).value,
      mid: document.getElementById(`mid${oldIndex}`).value,
      last: document.getElementById(`last${oldIndex}`).value,
      carName: document.getElementById(`carName${oldIndex}`).value,
      ownerName: document.getElementById(`ownerName${oldIndex}`).value,
      applicantName: document.getElementById(`applicantName${oldIndex}`).value,
      applicantPhone: document.getElementById(`applicantPhone${oldIndex}`).value,
      zones: Array.from(document.querySelectorAll(`[data-access-zone-group="${oldIndex}"] input:checked`)).map((input) => input.value),
      masterKey: document.getElementById(`masterKeyRequested${oldIndex}`).checked
    };
  });
  vehicleListEl.innerHTML = "";
  vehicleCount = 0;
  values.forEach((value) => {
    addVehicleBlock();
    const index = vehicleCount;
    document.getElementById(`region${index}`).value = value.region;
    document.getElementById(`mid${index}`).value = value.mid;
    document.getElementById(`last${index}`).value = value.last;
    document.getElementById(`carName${index}`).value = value.carName;
    document.getElementById(`ownerName${index}`).value = value.ownerName;
    document.getElementById(`applicantName${index}`).value = value.applicantName;
    document.getElementById(`applicantPhone${index}`).value = value.applicantPhone;
    value.zones.forEach((zone) => {
      const input = document.querySelector(`[data-access-zone-group="${index}"] input[value="${zone}"]`);
      if (input) input.checked = true;
    });
    document.getElementById(`masterKeyRequested${index}`).checked = value.masterKey;
  });
}
function getSelectedCompanyType(){
  const checked = document.querySelector('input[name="companyType"]:checked');
  return checked ? checked.value : "";
}
function getSelectedAccessZones(index){
  return Array.from(document.querySelectorAll(`[data-access-zone-group="${index}"] input:checked`)).map((input) => input.value);
}
function getVehicleInput(index){
  return {
    car_order: index,
    plate_region: document.getElementById(`region${index}`).value.trim() || "\uC5C6\uC74C",
    plate_middle: document.getElementById(`mid${index}`).value.trim().toUpperCase(),
    plate_number: document.getElementById(`last${index}`).value.replace(/\D/g,"").trim(),
    car_name: document.getElementById(`carName${index}`).value.trim(),
    owner_name: document.getElementById(`ownerName${index}`).value.trim(),
    applicant_name: document.getElementById(`applicantName${index}`).value.trim(),
    applicant_phone: formatPhone(document.getElementById(`applicantPhone${index}`).value),
    access_zones: getSelectedAccessZones(index),
    master_key_requested: document.getElementById(`masterKeyRequested${index}`).checked
  };
}
function hasVehicleData(vehicle){
  return Boolean(vehicle.plate_middle || vehicle.plate_number || vehicle.car_name || vehicle.owner_name || vehicle.applicant_name || vehicle.applicant_phone || vehicle.access_zones.length || vehicle.master_key_requested);
}
function resetForm(){
  companyNameEl.value = "";
  document.querySelectorAll('input[name="companyType"]').forEach((input) => { input.checked = false; });
  vehicleListEl.innerHTML = "";
  vehicleCount = 0;
  addVehicleBlock();
  clearStatus();
}
async function handleSubmit(){
  const companyName = companyNameEl.value.trim();
  const companyType = getSelectedCompanyType();
  if (!companyName) {
    setStatus("\uC5C5\uCCB4\uBA85\uC744 \uC785\uB825\uD574 \uC8FC\uC138\uC694.","error");
    return;
  }
  if (!companyType) {
    setStatus("\uAD6C\uBD84\uC744 \uC120\uD0DD\uD574 \uC8FC\uC138\uC694.","error");
    return;
  }
  const vehicles = Array.from({ length: vehicleCount }, (_, i) => getVehicleInput(i + 1)).filter(hasVehicleData);
  if (!vehicles.length) {
    setStatus("\uCD5C\uC18C 1\uB300 \uC774\uC0C1\uC758 \uCC28\uB7C9\uC815\uBCF4\uB97C \uC785\uB825\uD574 \uC8FC\uC138\uC694.","error");
    return;
  }
  const duplicateCheck = new Set();
  for (const vehicle of vehicles) {
    if (!/^\d{2,3}[\uAC00-\uD7A3]$/.test(vehicle.plate_middle)) {
      setStatus(`\uCC28\uB7C9 ${vehicle.car_order}\uC758 \uCC28\uB7C9\uBC88\uD638 \uC55E\uBD80\uBD84\uC744 \uD655\uC778\uD574 \uC8FC\uC138\uC694.`, "error");
      return;
    }
    if (!/^\d{4}$/.test(vehicle.plate_number)) {
      setStatus(`\uCC28\uB7C9 ${vehicle.car_order}\uC758 \uCC28\uB7C9\uBC88\uD638 \uB4B7\uBD80\uBD84\uC744 \uD655\uC778\uD574 \uC8FC\uC138\uC694.`, "error");
      return;
    }
    if (!vehicle.owner_name) {
      setStatus(`\uCC28\uB7C9 ${vehicle.car_order}\uC758 \uC18C\uC720\uC790 \uC131\uD568\uC744 \uC785\uB825\uD574 \uC8FC\uC138\uC694.`, "error");
      return;
    }
    if (!vehicle.applicant_name) {
      setStatus(`\uCC28\uB7C9 ${vehicle.car_order}\uC758 \uC0AC\uC6A9\uC790 \uC131\uD568\uC744 \uC785\uB825\uD574 \uC8FC\uC138\uC694.`, "error");
      return;
    }
    if (!vehicle.applicant_phone || !isValidPhone(vehicle.applicant_phone)) {
      setStatus(`\uCC28\uB7C9 ${vehicle.car_order}\uC758 \uC0AC\uC6A9\uC790 \uC5F0\uB77D\uCC98\uB97C 010-1234-5678 \uD615\uC2DD\uC73C\uB85C \uC785\uB825\uD574 \uC8FC\uC138\uC694.`, "error");
      return;
    }
    if (!vehicle.access_zones.length) {
      setStatus(`\uCC28\uB7C9 ${vehicle.car_order}\uC758 \uCD9C\uC785\uAD6C\uC5ED\uC744 1\uAC1C \uC774\uC0C1 \uC120\uD0DD\uD574 \uC8FC\uC138\uC694.`, "error");
      return;
    }
    const key = `${vehicle.plate_region}|${vehicle.plate_middle}|${vehicle.plate_number}`;
    if (duplicateCheck.has(key)) {
      setStatus("\uAC19\uC740 \uC2E0\uCCAD\uC11C \uC548\uC5D0 \uB3D9\uC77C\uD55C \uCC28\uB7C9\uBC88\uD638\uB97C \uB450 \uBC88 \uC785\uB825\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.", "error");
      return;
    }
    duplicateCheck.add(key);
  }
  if (SUPABASE_URL.includes("\uC5EC\uAE30\uC5D0_") || SUPABASE_ANON_KEY.includes("\uC5EC\uAE30\uC5D0_")) {
    setStatus("\uBA3C\uC800 \uCF54\uB4DC \uC548\uC758 SUPABASE_URL\uACFC SUPABASE_ANON_KEY\uB97C \uC2E4\uC81C \uAC12\uC73C\uB85C \uBC14\uAFD4 \uC8FC\uC138\uC694.", "error");
    return;
  }
  const submissionId = getSubmissionId();
  const rows = vehicles.map((vehicle) => ({
    submission_id: submissionId,
    company_name: companyName,
    company_type: companyType,
    plate_region: vehicle.plate_region,
    plate_middle: vehicle.plate_middle,
    plate_number: vehicle.plate_number,
    car_name: vehicle.car_name || null,
    owner_name: vehicle.owner_name,
    applicant_name: vehicle.applicant_name,
    applicant_phone: vehicle.applicant_phone,
    access_zones: vehicle.access_zones,
    master_key_requested: vehicle.master_key_requested,
    memo: null,
    car_order: vehicle.car_order
  }));
  submitBtn.disabled = true;
  resetBtn.disabled = true;
  addVehicleBtn.disabled = true;
  setStatus("\uC81C\uCD9C \uC911\uC785\uB2C8\uB2E4. \uC7A0\uC2DC\uB9CC \uAE30\uB2E4\uB824 \uC8FC\uC138\uC694.","info");
  try{
    const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey":SUPABASE_ANON_KEY,
        "Authorization":`Bearer ${SUPABASE_ANON_KEY}`,
        "Prefer":"return=minimal"
      },
      body:JSON.stringify(rows)
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok) {
      if (data && (data.code === "23505" || String(data.message || "").includes("duplicate"))) {
        setStatus("\uC774\uBBF8 \uB4F1\uB85D\uB41C \uCC28\uB7C9\uBC88\uD638\uAC00 \uC788\uC5B4 \uC81C\uCD9C\uB418\uC9C0 \uC54A\uC558\uC2B5\uB2C8\uB2E4.", "error");
      } else {
        setStatus(`\uC81C\uCD9C\uC5D0 \uC2E4\uD328\uD588\uC2B5\uB2C8\uB2E4. ${data.message || "Supabase \uC124\uC815\uC744 \uB2E4\uC2DC \uD655\uC778\uD574 \uC8FC\uC138\uC694."}`, "error");
      }
      return;
    }
    resetForm();
    setStatus(`\uC81C\uCD9C\uC774 \uC644\uB8CC\uB418\uC5C8\uC2B5\uB2C8\uB2E4. \uC800\uC7A5\uB41C \uCC28\uB7C9 \uC218: ${rows.length}\uB300`, "success");
    window.setTimeout(() => {
      location.href = "./index.html";
    }, 1200);
  }catch(error){
    setStatus(`\uC624\uB958\uAC00 \uBC1C\uC0DD\uD588\uC2B5\uB2C8\uB2E4. ${error.message}`, "error");
  }finally{
    submitBtn.disabled = false;
    resetBtn.disabled = false;
    addVehicleBtn.disabled = false;
  }
}
addVehicleBtn.addEventListener("click", addVehicleBlock);
submitBtn.addEventListener("click", handleSubmit);
resetBtn.addEventListener("click", resetForm);
addVehicleBlock();
</script>
</body>
</html>
