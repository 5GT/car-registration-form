<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량등록 관리자 테스트</title>
<style>
:root{
  --bg:#f4efe8;
  --panel:#fffdf9;
  --line:#d8cec1;
  --text:#22343b;
  --sub:#63757c;
  --accent:#155e66;
  --accent-strong:#0f4c52;
  --danger:#a13f2b;
  --danger-soft:#f7e6e1;
  --ok:#1c7a52;
  --shadow:0 18px 48px rgba(37, 32, 24, 0.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#f8f4ee 0%,#eee4d6 100%);
  color:var(--text);
  font-family:"Malgun Gothic","Noto Sans KR",sans-serif;
}
.shell{max-width:1120px;margin:0 auto;padding:24px 16px 56px}
.hero,.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
}
.hero{padding:24px}
.panel{padding:20px;margin-top:18px}
h1,h2{margin:0}
.lead{margin:10px 0 0;color:var(--sub);line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px}
.c4{grid-column:span 4}
.c6{grid-column:span 6}
.c8{grid-column:span 8}
.c12{grid-column:span 12}
label{display:block;margin:0 0 8px;font-size:14px;font-weight:800}
input,textarea{
  width:100%;
  border:1px solid #cfc3b3;
  border-radius:14px;
  padding:12px 13px;
  font:inherit;
  background:#fff;
  color:var(--text);
}
textarea{min-height:90px;resize:vertical}
input:focus,textarea:focus{
  outline:2px solid rgba(21,94,102,.16);
  border-color:var(--accent);
}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{
  border:0;
  border-radius:14px;
  padding:12px 16px;
  font:inherit;
  font-weight:800;
  cursor:pointer;
}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff}
.btn.ghost{background:#eee6da;color:#465e65}
.btn.danger{background:var(--danger-soft);color:var(--danger)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.status{min-height:24px;margin-top:14px;font-size:14px;font-weight:700}
.status.info{color:var(--accent)}
.status.success{color:var(--ok)}
.status.error{color:var(--danger)}
.meta{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
.muted{color:var(--sub);font-size:14px}
.list{display:grid;gap:14px;margin-top:16px}
.card{
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  background:linear-gradient(180deg,#fffdfa 0%,#faf6ef 100%);
}
.card-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.title{font-size:18px;font-weight:800}
.badge{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  background:#ece5d8;
  color:#66543d;
  font-size:12px;
  font-weight:800;
}
.facts{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
.fact{
  border:1px solid #e2d8cb;
  border-radius:14px;
  padding:10px 12px;
  background:#fff;
}
.fact strong{display:block;font-size:12px;color:var(--sub);margin-bottom:4px}
.empty{
  border:1px dashed #cbbda9;
  border-radius:20px;
  padding:26px;
  text-align:center;
  color:var(--sub);
  background:rgba(255,255,255,.55);
}
@media (max-width:760px){
  .grid,.facts{grid-template-columns:1fr}
  .c4,.c6,.c8,.c12{grid-column:span 1}
}
</style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>차량등록 관리자 테스트</h1>
      <p class="lead">공용 관리자 계정으로 로그인한 뒤 차량등록 데이터 조회, 메모 수정, 삭제 권한이 정상인지 확인하는 테스트 페이지입니다.</p>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="c4">
          <label for="email">이메일</label>
          <input id="email" type="email" value="parkl4562@naver.com" autocomplete="username">
        </div>
        <div class="c4">
          <label for="password">비밀번호</label>
          <input id="password" type="password" autocomplete="current-password">
        </div>
        <div class="c4">
          <label>&nbsp;</label>
          <div class="actions">
            <button id="loginBtn" class="btn primary" type="button">로그인</button>
            <button id="logoutBtn" class="btn ghost" type="button">로그아웃</button>
          </div>
        </div>
      </div>
      <div id="authStatus" class="status info">로그인 전입니다.</div>
    </section>

    <section class="panel">
      <div class="meta">
        <div>
          <h2>접수 목록</h2>
          <div class="muted">최근 접수 50건을 불러옵니다. 테스트 데이터 삭제도 여기서 가능합니다.</div>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="btn ghost" type="button">새로고침</button>
        </div>
      </div>
      <div id="dataStatus" class="status info">로그인 후 조회해 주세요.</div>
      <div id="list" class="list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  "use strict";

  const SUPABASE_URL = "https://qjaqbvytoyqysdlfywbm.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqYXFidnl0b3lxeXNkbGZ5d2JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzA0NTMsImV4cCI6MjA4ODc0NjQ1M30.GMiLAzShrjCVT5k3GcyUodfndEobwHvpwWp-PtxrN0Y";
  const TABLE_NAME = "car_registrations";
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const emailEl = document.getElementById("email");
  const passwordEl = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const refreshBtn = document.getElementById("refreshBtn");
  const authStatusEl = document.getElementById("authStatus");
  const dataStatusEl = document.getElementById("dataStatus");
  const listEl = document.getElementById("list");

  function setAuthStatus(message, type) {
    authStatusEl.textContent = message;
    authStatusEl.className = "status " + type;
  }

  function setDataStatus(message, type) {
    dataStatusEl.textContent = message;
    dataStatusEl.className = "status " + type;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function formatDate(value) {
    if (!value) return "-";
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? value : date.toLocaleString("ko-KR");
  }

  function buildCard(row) {
    const plate = [row.plate_region, row.plate_middle, row.plate_number].filter(Boolean).join(" ");
    const memo = row.memo || "";
    const item = document.createElement("article");
    item.className = "card";
    item.innerHTML = `
      <div class="card-head">
        <div>
          <div class="title">${escapeHtml(row.building_number || "-")}동 ${escapeHtml(row.unit_number || "-")}호</div>
          <div class="muted">${escapeHtml(plate || "-")} / ${escapeHtml(row.car_name || "차명 미입력")}</div>
        </div>
        <span class="badge">ID ${escapeHtml(row.id)}</span>
      </div>
      <div class="facts">
        <div class="fact"><strong>신청인</strong>${escapeHtml(row.applicant_name || "-")}</div>
        <div class="fact"><strong>연락처</strong>${escapeHtml(row.applicant_phone || "-")}</div>
        <div class="fact"><strong>소유자</strong>${escapeHtml(row.owner_name || "-")}</div>
        <div class="fact"><strong>접수일</strong>${escapeHtml(formatDate(row.created_at))}</div>
      </div>
      <div style="margin-top:12px">
        <label for="memo-${row.id}">메모</label>
        <textarea id="memo-${row.id}">${escapeHtml(memo)}</textarea>
      </div>
      <div class="actions" style="margin-top:12px">
        <button class="btn primary" type="button" data-action="save" data-id="${row.id}">메모 저장</button>
        <button class="btn danger" type="button" data-action="delete" data-id="${row.id}">삭제</button>
      </div>
    `;
    return item;
  }

  function renderRows(rows) {
    listEl.innerHTML = "";
    if (!rows.length) {
      listEl.innerHTML = '<div class="empty">조회된 차량등록 데이터가 없습니다.</div>';
      return;
    }
    rows.forEach((row) => listEl.appendChild(buildCard(row)));
  }

  async function loadRows() {
    setDataStatus("목록을 불러오는 중입니다.", "info");
    const { data, error } = await supabaseClient
      .from(TABLE_NAME)
      .select("id, submission_id, building_number, unit_number, plate_region, plate_middle, plate_number, car_name, owner_name, applicant_name, applicant_phone, memo, created_at")
      .order("id", { ascending: false })
      .limit(50);

    if (error) {
      renderRows([]);
      setDataStatus("조회 실패: " + error.message, "error");
      return;
    }

    renderRows(data || []);
    setDataStatus("조회 완료: " + (data?.length || 0) + "건", "success");
  }

  async function login() {
    const email = emailEl.value.trim();
    const password = passwordEl.value;
    if (!email || !password) {
      setAuthStatus("이메일과 비밀번호를 입력해 주세요.", "error");
      return;
    }
    loginBtn.disabled = true;
    setAuthStatus("로그인 중입니다.", "info");
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    loginBtn.disabled = false;
    if (error) {
      setAuthStatus("로그인 실패: " + error.message, "error");
      return;
    }
    setAuthStatus("로그인되었습니다. 관리자 권한을 확인합니다.", "success");
    await loadRows();
  }

  async function logout() {
    await supabaseClient.auth.signOut();
    listEl.innerHTML = "";
    setAuthStatus("로그아웃되었습니다.", "info");
    setDataStatus("로그인 후 조회해 주세요.", "info");
  }

  async function saveMemo(id) {
    const textarea = document.getElementById("memo-" + id);
    const memo = textarea ? textarea.value.trim() : "";
    setDataStatus("메모를 저장하는 중입니다.", "info");
    const { error } = await supabaseClient
      .from(TABLE_NAME)
      .update({ memo })
      .eq("id", id);

    if (error) {
      setDataStatus("메모 저장 실패: " + error.message, "error");
      return;
    }
    setDataStatus("메모 저장 완료", "success");
    await loadRows();
  }

  async function deleteRow(id) {
    const ok = window.confirm("이 차량등록 데이터를 삭제할까요?");
    if (!ok) return;
    setDataStatus("데이터를 삭제하는 중입니다.", "info");
    const { error } = await supabaseClient
      .from(TABLE_NAME)
      .delete()
      .eq("id", id);

    if (error) {
      setDataStatus("삭제 실패: " + error.message, "error");
      return;
    }
    setDataStatus("삭제 완료", "success");
    await loadRows();
  }

  listEl.addEventListener("click", async (event) => {
    const button = event.target.closest("button[data-action]");
    if (!button) return;
    const id = Number(button.dataset.id);
    const action = button.dataset.action;
    button.disabled = true;
    if (action === "save") await saveMemo(id);
    if (action === "delete") await deleteRow(id);
    button.disabled = false;
  });

  loginBtn.addEventListener("click", login);
  logoutBtn.addEventListener("click", logout);
  refreshBtn.addEventListener("click", loadRows);

  supabaseClient.auth.getSession().then(async ({ data }) => {
    if (data.session) {
      setAuthStatus("기존 로그인 세션이 있습니다.", "success");
      await loadRows();
    }
  });
  </script>
</body>
</html>
