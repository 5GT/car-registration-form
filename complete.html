<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#xC2E0;&#xCCAD; &#xC644;&#xB8CC;</title>
<style>
:root{
  --paper:#f7fbfc;
  --ink:#17383f;
  --sub:#45656b;
  --line:#c3d5d8;
  --accent:#2c6773;
  --accent-strong:#1f5662;
  --accent-soft:#e7f0f2;
  --shadow:0 20px 60px rgba(23,56,63,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI","Malgun Gothic",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top right, rgba(44,103,115,.12), transparent 24rem),
    radial-gradient(circle at top left, rgba(31,86,98,.08), transparent 20rem),
    linear-gradient(180deg,#f9fcfd 0%,#edf4f6 100%);
}
.wrap{
  width:min(920px,calc(100% - 32px));
  margin:0 auto;
  padding:40px 0 72px;
}
.panel{
  background:var(--paper);
  border:1px solid rgba(255,255,255,.72);
  border-radius:30px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.hero{
  position:relative;
  padding:28px 32px 24px 148px;
  border-bottom:1px solid var(--line);
  background:
    linear-gradient(135deg,rgba(44,103,115,.10),rgba(44,103,115,0)),
    linear-gradient(180deg,#ffffff,#f6fbfc);
}
.hero::before{
  content:"";
  position:absolute;
  left:34px;
  top:22px;
  width:88px;
  height:88px;
  background:url("./parkreeks-logo.png") center/contain no-repeat;
}
.eyebrow{
  display:inline-flex;
  padding:8px 14px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent-strong);
  font-size:12px;
  font-weight:700;
}
h1{
  margin:0 0 10px;
  font-size:clamp(30px,4.4vw,44px);
  line-height:1.12;
  color:var(--accent-strong);
}
.lead{
  margin:0;
  color:var(--sub);
  line-height:1.7;
}
.content{
  padding:28px 32px 32px;
}
.summary{
  display:grid;
  gap:16px;
}
.card{
  padding:20px;
  border:1px solid var(--line);
  border-radius:22px;
  background:#ffffff;
}
.card h2{
  margin:0 0 12px;
  font-size:18px;
}
.meta{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.fact{
  padding:12px 14px;
  border-radius:16px;
  background:#fff;
  border:1px solid #d9e5e7;
}
.fact strong{
  display:block;
  margin-bottom:6px;
  font-size:13px;
}
.vehicle-list{
  display:grid;
  gap:12px;
}
.vehicle{
  padding:14px 16px;
  border-radius:16px;
  background:#fff;
  border:1px solid #d9e5e7;
}
.vehicle .title{
  font-weight:800;
  margin-bottom:6px;
}
.vehicle .line{
  color:var(--sub);
  line-height:1.6;
  font-size:14px;
}
.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:24px;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:52px;
  padding:0 18px;
  border-radius:16px;
  text-decoration:none;
  font-weight:700;
}
.btn.primary{
  background:var(--accent);
  color:#fff;
}
.btn.secondary{
  background:#f1f6f7;
  color:var(--ink);
}
@media (max-width:700px){
  .wrap{width:min(100%,calc(100% - 20px));padding:20px 0 40px}
  .hero,.content{padding:22px 18px}
  .hero{padding-top:112px}
  .hero::before{left:18px;top:18px;width:76px;height:76px}
  .meta{grid-template-columns:1fr}
}
</style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="hero">
        <span class="eyebrow">SUBMISSION COMPLETE</span>
        <h1>&#xC2E0;&#xCCAD;&#xC11C; &#xC81C;&#xCD9C;&#xC774; &#xC644;&#xB8CC;&#xB418;&#xC5C8;&#xC2B5;&#xB2C8;&#xB2E4;.</h1>
        <p class="lead" id="lead">&#xC785;&#xB825;&#xD558;&#xC2E0; &#xB0B4;&#xC6A9;&#xC740; &#xC544;&#xB798;&#xC5D0;&#xC11C; &#xD655;&#xC778;&#xD558;&#xC2E4; &#xC218; &#xC788;&#xC2B5;&#xB2C8;&#xB2E4;.</p>
      </div>
      <div class="content">
        <div id="summary" class="summary"></div>
        <div class="actions">
          <a href="./index.html" class="btn primary">&#xBA54;&#xC778;&#xC73C;&#xB85C; &#xB3CC;&#xC544;&#xAC00;&#xAE30;</a>
          <a id="againLink" href="./index.html" class="btn secondary">&#xB2E4;&#xC2DC; &#xC2E0;&#xCCAD;&#xD558;&#xAE30;</a>
        </div>
      </div>
    </section>
  </main>
<script>
"use strict";
const raw = sessionStorage.getItem("submissionCompletePayload");
const summaryEl = document.getElementById("summary");
const leadEl = document.getElementById("lead");
const againLinkEl = document.getElementById("againLink");

function esc(value){
  return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}

if (!raw) {
  leadEl.textContent = "\uD45C\uC2DC\uD560 \uC81C\uCD9C \uC815\uBCF4\uAC00 \uC5C6\uC5B4 \uBA54\uC778 \uD398\uC774\uC9C0\uB85C \uC774\uB3D9\uD574 \uB2E4\uC2DC \uC9C4\uD589\uD574 \uC8FC\uC138\uC694.";
  summaryEl.innerHTML = '<div class="card"><h2>\uC548\uB0B4</h2><p>\uC81C\uCD9C \uC9C1\uD6C4\uC5D0\uB9CC \uC2E0\uCCAD \uC694\uC57D\uC744 \uD655\uC778\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4. \uBA54\uC778\uC73C\uB85C \uB3CC\uC544\uAC00 \uB2E4\uC2DC \uC9C4\uD589\uD574 \uC8FC\uC138\uC694.</p></div>';
} else {
  const data = JSON.parse(raw);
  const resident = data.type === "resident";
  againLinkEl.href = resident ? "./resident.html" : "./external.html";
  const meta = resident
    ? `
      <div class="fact"><strong>\uC2E0\uCCAD \uC720\uD615</strong>\uC785\uC8FC\uBBFC \uCC28\uB7C9 \uB4F1\uB85D</div>
      <div class="fact"><strong>\uC138\uB300 \uC815\uBCF4</strong>${esc(data.buildingNumber)}\uB3D9 ${esc(data.unitNumber)}\uD638</div>
      <div class="fact"><strong>\uBA54\uBAA8</strong>${esc(data.memo || "-")}</div>
      <div class="fact"><strong>\uC811\uC218 \uCC28\uB7C9 \uC218</strong>${esc(data.vehicleCount)}\uB300</div>
    `
    : `
      <div class="fact"><strong>\uC2E0\uCCAD \uC720\uD615</strong>\uC678\uBD80 \uCC28\uB7C9 \uB4F1\uB85D</div>
      <div class="fact"><strong>\uC5C5\uCCB4\uBA85</strong>${esc(data.companyName || "-")}</div>
      <div class="fact"><strong>\uAD6C\uBD84</strong>${esc(data.companyType || "-")}</div>
      <div class="fact"><strong>\uC811\uC218 \uCC28\uB7C9 \uC218</strong>${esc(data.vehicleCount)}\uB300</div>
    `;
  const vehicles = (data.vehicles || []).map((vehicle, index) => {
    const extra = resident
      ? `\uC138\uB300\uC54C\uB9BC: ${vehicle.householdNotice ? "\uC0AC\uC6A9" : "\uC0AC\uC6A9\uC548\uD568"}`
      : `\uCD9C\uC785\uAD6C\uC5ED: ${esc((vehicle.accessZones || []).join(", ") || "-")} / \uB9C8\uC2A4\uD130\uD0A4 \uBC1C\uAE09: ${vehicle.masterKeyRequested ? "\uC694\uCCAD" : "\uBBF8\uC2E0\uCCAD"}`;
    return `
      <div class="vehicle">
        <div class="title">\uCC28\uB7C9 ${index + 1} - ${esc(vehicle.carNumber || "-")}</div>
        <div class="line">\uCC28\uBA85: ${esc(vehicle.carName || "-")} / \uC18C\uC720\uC790: ${esc(vehicle.ownerName || "-")}</div>
        <div class="line">\uC0AC\uC6A9\uC790: ${esc(vehicle.applicantName || "-")} / \uC5F0\uB77D\uCC98: ${esc(vehicle.applicantPhone || "-")}</div>
        <div class="line">${extra}</div>
      </div>
    `;
  }).join("");
  summaryEl.innerHTML = `
    <section class="card">
      <h2>\uC2E0\uCCAD \uC815\uBCF4</h2>
      <div class="meta">${meta}</div>
    </section>
    <section class="card">
      <h2>\uCC28\uB7C9 \uC694\uC57D</h2>
      <div class="vehicle-list">${vehicles}</div>
    </section>
  `;
  sessionStorage.removeItem("submissionCompletePayload");
}
</script>
</body>
</html>
