<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신청 완료</title>
<style>
:root{
  --paper:#fffdf8;
  --ink:#20333a;
  --sub:#5f7178;
  --line:#d4cbbd;
  --accent:#1f6f78;
  --accent-strong:#155057;
  --accent-soft:#e1efed;
  --shadow:0 20px 60px rgba(44,42,34,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI","Malgun Gothic",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top right, rgba(31,111,120,.14), transparent 22rem),
    linear-gradient(180deg,#f8f3ea 0%,#efe6d8 100%);
}
.wrap{
  width:min(920px,calc(100% - 32px));
  margin:0 auto;
  padding:40px 0 72px;
}
.panel{
  background:var(--paper);
  border:1px solid rgba(255,255,255,.72);
  border-radius:30px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.hero{
  padding:34px 32px 24px;
  border-bottom:1px solid var(--line);
  background:
    linear-gradient(135deg,rgba(31,111,120,.10),rgba(31,111,120,0)),
    linear-gradient(180deg,#fffdf9,#f7f0e5);
}
.eyebrow{
  display:inline-flex;
  padding:8px 14px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent-strong);
  font-size:12px;
  font-weight:700;
}
h1{
  margin:16px 0 10px;
  font-size:clamp(30px,4.4vw,44px);
  line-height:1.12;
}
.lead{
  margin:0;
  color:var(--sub);
  line-height:1.7;
}
.content{
  padding:28px 32px 32px;
}
.summary{
  display:grid;
  gap:16px;
}
.card{
  padding:20px;
  border:1px solid var(--line);
  border-radius:22px;
  background:#fffdfa;
}
.card h2{
  margin:0 0 12px;
  font-size:18px;
}
.meta{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.fact{
  padding:12px 14px;
  border-radius:16px;
  background:#fff;
  border:1px solid #e8ddd0;
}
.fact strong{
  display:block;
  margin-bottom:6px;
  font-size:13px;
}
.vehicle-list{
  display:grid;
  gap:12px;
}
.vehicle{
  padding:14px 16px;
  border-radius:16px;
  background:#fff;
  border:1px solid #e8ddd0;
}
.vehicle .title{
  font-weight:800;
  margin-bottom:6px;
}
.vehicle .line{
  color:var(--sub);
  line-height:1.6;
  font-size:14px;
}
.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:24px;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:52px;
  padding:0 18px;
  border-radius:16px;
  text-decoration:none;
  font-weight:700;
}
.btn.primary{
  background:var(--accent);
  color:#fff;
}
.btn.secondary{
  background:#ece3d4;
  color:var(--ink);
}
@media (max-width:700px){
  .wrap{width:min(100%,calc(100% - 20px));padding:20px 0 40px}
  .hero,.content{padding:22px 18px}
  .meta{grid-template-columns:1fr}
}
</style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="hero">
        <span class="eyebrow">SUBMISSION COMPLETE</span>
        <h1>신청서 제출이 완료되었습니다.</h1>
        <p class="lead" id="lead">입력하신 내용을 아래에서 확인하실 수 있습니다.</p>
      </div>
      <div class="content">
        <div id="summary" class="summary"></div>
        <div class="actions">
          <a href="./index.html" class="btn primary">메인으로 돌아가기</a>
          <a id="againLink" href="./index.html" class="btn secondary">다시 신청하기</a>
        </div>
      </div>
    </section>
  </main>
<script>
"use strict";
const raw = sessionStorage.getItem("submissionCompletePayload");
const summaryEl = document.getElementById("summary");
const leadEl = document.getElementById("lead");
const againLinkEl = document.getElementById("againLink");

function esc(value){
  return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}

if (!raw) {
  leadEl.textContent = "표시할 제출 정보가 없어 메인 페이지로 이동해 다시 진행해 주세요.";
  summaryEl.innerHTML = '<div class="card"><h2>안내</h2><p>제출 직후에만 신청 요약을 확인할 수 있습니다. 메인으로 돌아가 다시 진행해 주세요.</p></div>';
} else {
  const data = JSON.parse(raw);
  const resident = data.type === "resident";
  againLinkEl.href = resident ? "./resident.html" : "./external.html";
  const meta = resident
    ? `
      <div class="fact"><strong>신청 유형</strong>입주민 차량 등록</div>
      <div class="fact"><strong>세대 정보</strong>${esc(data.buildingNumber)}동 ${esc(data.unitNumber)}호</div>
      <div class="fact"><strong>메모</strong>${esc(data.memo || "-")}</div>
      <div class="fact"><strong>접수 차량 수</strong>${esc(data.vehicleCount)}대</div>
    `
    : `
      <div class="fact"><strong>신청 유형</strong>외부 차량 등록</div>
      <div class="fact"><strong>업체명</strong>${esc(data.companyName)}</div>
      <div class="fact"><strong>구분</strong>${esc(data.companyType)}</div>
      <div class="fact"><strong>접수 차량 수</strong>${esc(data.vehicleCount)}대</div>
    `;
  const vehicles = (data.vehicles || []).map((vehicle, index) => {
    const extra = resident
      ? `세대알림: ${vehicle.householdNotice ? "사용" : "해제"}`
      : `출입구역: ${esc((vehicle.accessZones || []).join(", ") || "-")} / 마스터키 발급: ${vehicle.masterKeyRequested ? "신청" : "미신청"}`;
    return `
      <div class="vehicle">
        <div class="title">차량 ${index + 1} - ${esc(vehicle.carNumber || "-")}</div>
        <div class="line">차명: ${esc(vehicle.carName || "-")} / 소유자: ${esc(vehicle.ownerName || "-")}</div>
        <div class="line">사용자: ${esc(vehicle.applicantName || "-")} / 연락처: ${esc(vehicle.applicantPhone || "-")}</div>
        <div class="line">${extra}</div>
      </div>
    `;
  }).join("");
  summaryEl.innerHTML = `
    <section class="card">
      <h2>신청 정보</h2>
      <div class="meta">${meta}</div>
    </section>
    <section class="card">
      <h2>차량 요약</h2>
      <div class="vehicle-list">${vehicles}</div>
    </section>
  `;
  sessionStorage.removeItem("submissionCompletePayload");
}
</script>
</body>
</html>
